# ==================== 全局默认配置 ====================
# 所有模型、数据集、任务类型的通用默认参数

# 基础配置
is_training: 1
des: "Exp"
itr: 1

# 数据加载
freq: "h"
target: "OT"
checkpoints: "/app/checkpoints/"
num_workers: 10

# 序列长度（默认值，会被具体任务覆盖）
seq_len: 96
label_len: 48
pred_len: 96

# 模型架构（通用默认值）
d_model: 512
n_heads: 8
e_layers: 2
d_layers: 1
d_ff: 2048
factor: 1
dropout: 0.1
activation: "gelu"
embed: "timeF"
top_k: 5
num_kernels: 6

# 优化器
batch_size: 32
learning_rate: 0.0001
train_epochs: 10
patience: 3
loss: "MSE"
lradj: "type1"
use_amp: false

# GPU配置
use_gpu: true
gpu: 0
gpu_type: "cuda"
use_multi_gpu: false
devices: "0,1,2,3"

# 其他通用参数
random_seed: 2021
use_dtw: false
inverse: false
distil: true
use_norm: 1
channel_independence: 1
decomp_method: "moving_avg"
moving_avg: 25
down_sampling_layers: 0
down_sampling_window: 1
down_sampling_method: null

# 数据增强
augmentation_ratio: 0
seed: 2
jitter: false
scaling: false
permutation: false

# 噪声相关
add_noise: false
noise_amp: 1.0
noise_freq_percentage: 0.05
noise_seed: 2023
noise_type: "sin"
data_percentage: 1.0

# 特征类型（默认多变量）
features: M

