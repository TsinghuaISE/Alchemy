embedding_size: 64
n_layers: 2
dropout_ratio: 0.5
cl_weight: [0.01, 0.05, 0.1, 0.5]
reg_weight: [0.0001, 0.001, 0.01]

epochs: 200
batch_size: 2048
learning_rate: [0.0001, 0.0005, 0.001]
weight_decay: 0.0

eval_args:
  split: {'RS': [0.8, 0.1, 0.1]}
  group_by: user
  order: RO
  mode: full

metrics: ['Recall', 'NDCG']
topk: [10, 20]
valid_metric: NDCG@10

hyper_parameters: ["cl_weight", "reg_weight", "learning_rate"]