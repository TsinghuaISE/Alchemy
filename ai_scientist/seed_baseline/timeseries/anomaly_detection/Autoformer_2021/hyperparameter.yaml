# Autoformer for Anomaly Detection
# Paper: Autoformer: Decomposition Transformers with Auto-Correlation (NeurIPS 2021)

task_name: anomaly_detection
is_training: 1

# Sequence Configuration
seq_len: 100
pred_len: 0
label_len: 48

# Model Architecture
d_model: 128
d_ff: 128
n_heads: 8
e_layers: 2
d_layers: 1

# Auto-Correlation Specific
factor: 1
moving_avg: 25

# Training Configuration
dropout: 0.1
activation: gelu
learning_rate: 0.0001
batch_size: 32
train_epochs: 10
patience: 3

# Anomaly Detection
anomaly_ratio: 1

# Embedding
embed: timeF
freq: h