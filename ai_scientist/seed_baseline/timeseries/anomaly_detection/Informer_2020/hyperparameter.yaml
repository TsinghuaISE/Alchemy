# Informer for Anomaly Detection
# Based on paper: Informer: Beyond Efficient Transformer for Long Sequence Time-Series Forecasting

# Task configuration
task_name: anomaly_detection
seq_len: 100
pred_len: 0
label_len: 48

# Model architecture (from paper)
d_model: 512
n_heads: 8
e_layers: 2
d_layers: 1
d_ff: 2048
factor: 5
distil: true
activation: gelu

# Embedding
embed: timeF
freq: h

# Regularization
dropout: 0.1
anomaly_ratio: 1

# Training (from paper)
learning_rate: 0.0001
batch_size: 32
train_epochs: 10
patience: 3
lradj: type1

# Loss
loss: MSE